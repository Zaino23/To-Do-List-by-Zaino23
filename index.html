<html>
  <head>
    <title>To-Do List</title>
    <link rel="icon" type="image/png" href="logo.png">
    <style>
      body {
        background-color: turquoise;
        font-family: arial;
      }
      #welcome {
        color: white;
        -webkit-text-stroke: 2px black;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
      }   
      #create {
        color: white;
        border: 1px solid white;
        border-radius: 5px;
        font-size: 15px;
        background-color: red;
        padding: 5px;
        cursor: pointer;
      }
      #create:hover{
        background-color: hsl(0, 71%, 45.99%);
        transform: scale(1.123456789);
      }
      #create:disabled:hover {
        transform: none;
        cursor: not-allowed;
      }
      #create:disabled{
        opacity: 0.6;
        background-color: hsl(0, 71%, 45.99%); 
        transform: none;
        cursor: not-allowed;
      }
      #ToDoBox {
        background: white;
        padding: 30px;
        border-radius: 15px;
        width: 300px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        text-align: center;
      }
      #app {
      display: flex;
      justify-content: center;
      padding-top: 40px; 
      }


      .list{
        padding: 0px;
        max-height: 300px;
        overflow-y: auto;
      }
      li{
        background-color: hsl(0 , 0% , 75.67%);
        border-radius: 15px;
        text-align: left;
        position: relative;
        padding: 5px;
        padding-right: 40px; 
        margin-bottom: 5px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      li:hover{
        font-size: 105%;
        background-color: hsl(0 , 0% , 80.80%);
      }
      .reset{
        text-align: right;
        background-color: hsl(0, 100%, 50%);
        color: white;
        border: none;
        border-radius: 3px;
        padding: 5px;
        margin-left: 5px;
        cursor: pointer;
      }
      .reset:hover{
        background-color: hsl(0, 71%, 45.99%);
        border-radius: 3px;
        transform: scale(1.1);
      }
      .reset:disabled:hover{
        opacity: 0.6;
        background-color: hsl(0, 71%, 45.99%); 
        transform: none;
        cursor: not-allowed;
      }
      .reset:disabled{
        opacity: 0.6;
        background-color: hsl(0, 71%, 45.99%); 
        transform: none;
        cursor: not-allowed;

      }
      .delBtn{
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
        background-color: red;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      .delBtn:hover{
        font-size: 101%;
      }
      #author{
       position: fixed;
       bottom: 10px;
       right: 10px;
       margin: 0;
      }
      #author:hover{
        transform: scale(1.123);
        text-decoration: wavy;
      }
      .checkbox{
        margin-right: 5px;
        width: 30px;
        height: 15px;
      }
      .checkbox:hover{
        margin-right: 6px;
        transform: scale(1.23456789);
      }
      .input:hover{
        transform: scale(1.023456789999999999999999999999);
      }
      #left{
        scale: 1.1;
      }
      #left:hover{
        transform: scale(1.123456789);
      }
    </style>
  </head>

  <body>  
    <div id="app">
      <div id="ToDoBox">

        <h1 id="welcome">To-Do List</h1>
        <button class="reset" onclick="C();" disabled>C</button>
        <input type="text" class="input" id="input" placeholder="Enter a task . . ." autocomplete="off" required maxlength="26">
        <button id="create" onclick="renderTask();" disabled>Add</button>

        <h4 id="left"></h4>

        <ul class="list" type="none" tabindex="0"></ul>

      </div>
    </div>  

    <h4 id="author">Made by Zain</h4>
  
    <script>
      let list = document.querySelector('.list');
      const left = document.getElementById('left');
      let input = document.getElementById('input');
      let count = 0;
      let addBtn = document.getElementById('create');
      let clear = document.querySelector('.reset');
      document.addEventListener('DOMContentLoaded', loadTasks);

      input.addEventListener('keydown', function(event) {
        if (event.key === "Enter") {
          renderTask();
        }
      });

      document.addEventListener('keydown', function(event) {
        if (event.key === "Delete" && clear.disabled === false) {
          C();
        }
      });

      input.addEventListener('input', () => {
        if (input.value.length > 0) {
          addBtn.disabled = false;
        } else {
          addBtn.disabled = true;
        };
      })

      function renderTask(taskText) {
        let task = taskText || input.value.trim();
        if (!task) return;

        count++;
        updateCount();

        let creatTask = document.createElement('li');
        creatTask.textContent = task; 

        let checkBox = document.createElement('input');
        checkBox.type = 'checkbox';
        checkBox.classList.add('checkbox');

        let delBtn = document.createElement('button');
        delBtn.textContent = 'X';
        delBtn.classList.add('delBtn');

        delBtn.addEventListener('click', () => {
          if (checkBox.checked) {
          creatTask.remove();
          saveTasks();
          }else {
            creatTask.remove();
            count--;
            updateCount();
            saveTasks();
          }
          checkForTasks()
        });

        checkBox.addEventListener('click', () => {
        if (checkBox.checked) {
          count --;
          creatTask.style.cssText = 'text-decoration:line-through; opacity:0.6;'
        } else{
          count ++;
          creatTask.style.cssText = 'text-decoration:none; opacity:1;'
        }
        updateCount();
         
      })

        creatTask.appendChild(checkBox);
        creatTask.appendChild(delBtn);
        list.appendChild(creatTask);

        input.value = '';
        input.dispatchEvent(new Event('input'));
        input.focus();

        checkForTasks();
        saveTasks();
      }

      function saveTasks() {
        let items = document.querySelectorAll("li");
        let tasks = [];

        items.forEach(li => {

          tasks.push(li.firstChild.textContent.trim());
        });

        localStorage.setItem("saves", JSON.stringify(tasks));
      }

      function loadTasks() {
        let saved = JSON.parse(localStorage.getItem("saves")) || [];

        saved.forEach(task => {
          renderTask(task);
        });
      }

      function C() {
        list.innerHTML = '';
        input.value = '';
        input.focus();
        count = 0;
        updateCount();
        localStorage.removeItem("saves");
        checkForTasks()
        input.dispatchEvent(new Event('input'));
      }

      function updateCount() {
        left.innerHTML = `Task(s) left: ${count}`;
      }

      function checkForTasks() {
        let hasTasks = document.querySelectorAll("li").length > 0;
        if (hasTasks) {
          clear.disabled = false;
        }else {
          clear.disabled = true;
        }
      }
    </script>
  </body>
</html>
